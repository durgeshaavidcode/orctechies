# Proxy micro-frontend remote entries and assets to local dev servers
[[redirects]]
  from = "/auth-mfe/*"
  to = "http://localhost:5001/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/admin-mfe/*"
  to = "http://localhost:5002/:splat"
  status = 200
  force = true
# Netlify configuration file for monorepo deployment


[build]
  publish = "host-app/dist"
  command = "npm install --legacy-peer-deps --prefix shared-component && npm install --legacy-peer-deps --prefix admin-mfe && npm install --legacy-peer-deps --prefix auth-mfe && npm install --legacy-peer-deps --prefix host-app && npm run build --prefix host-app"

# Redirect all requests to index.html for SPA
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

